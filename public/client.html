<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Client Panel</title><link rel='stylesheet' href='/styles.css'></head>
<body><header class='topbar'><div class='logo'>KoPartner Client</div><nav><a href='/'>Home</a><button onclick='KP.logout()'>Logout</button></nav></header>
<section class='section'><h2>Book a Service</h2><div class='card'><select id='service'></select><input id='date' type='date'><input id='hours' type='number' min='1' value='2'><input id='notes' placeholder='Notes'><button class='primary' id='book'>Create Booking</button><p id='bookMsg'></p></div></section>
<section class='section'><h2>My Bookings</h2><div id='list' class='grid2'></div></section>
<script src='/app.js'></script><script>
(async()=>{const u=KP.getSession();if(!u||u.role!=='client')location.href='/login.html';
const services=await KP.api.getServices();service.innerHTML=services.map(s=>`<option value='${s.id}'>${s.name} - ₹${s.price_per_hour}/hr</option>`).join('');
async function load(){const rows=await KP.api.clientBookings(u.id);list.innerHTML=rows.map(r=>`<article class='card'><h3>${r.service_name}</h3><p>Date: ${r.booking_date}</p><p>Status: ${r.status}</p><p>Partner: ${r.partner_name||'Pending'}</p></article>`).join('')||'<p>No bookings.</p>';}
book.onclick=async()=>{await KP.api.createBooking({client_id:u.id,service_id:+service.value,booking_date:date.value,duration_hours:+hours.value,notes:notes.value});bookMsg.textContent='Booking created';await load();};
load();})();
</script></body></html>
